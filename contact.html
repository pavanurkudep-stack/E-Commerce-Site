<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ElectroMart | Contact</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page">
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="index.html">ElectroMart</a>
        <nav class="nav" aria-label="Primary">
          <a href="index.html">Home</a>
          <a href="products.html">Products</a>
          <a href="about.html">About</a>
          <a href="location.html">Location</a>
          <a href="contact.html">Contact</a>
          <a href="cart.html">Cart</a>

        </nav>
        <div class="header-actions"><div class="search">Support</div></div>
      </div>
    </header>

    <main class="container">
      <section class="section">
        <h2 class="section-title">Contact Us</h2>

        <div class="detail-grid" style="margin-top:14px;">
          <div class="card">
            <h3 style="margin-top:0;">Customer Support</h3>
            <div class="kv" style="margin-top:10px;">
              <div><span>Email</span><b>support@electromart.com</b></div>
              <div><span>Phone</span><b>+91 98765 43210</b></div>
              <div><span>Hours</span><b>10:00 AM - 7:00 PM</b></div>
            </div>
         
          </div>

          <div class="card">
            <h3 style="margin-top:0;">Send a Message</h3>
            <form action="#">
              <div class="form-grid" style="margin-top:12px;">
                <div>
                  <label class="small">Full Name</label>
                  <input type="text" placeholder="Your name" />
                </div>
                <div>
                  <label class="small">Email</label>
                  <input type="email" placeholder="you@example.com" />
                </div>
              </div>

              <div style="margin-top:12px;">
                <label class="small">Subject</label>
                <input type="text" placeholder="Order, return, payment..." />
              </div>

              <div style="margin-top:12px;">
                <label class="small">Message</label>
                <textarea placeholder="Write your message..."></textarea>
              </div>

              <div style="margin-top:12px;">
                <a class="btn primary" href="index.html" style="width:100%;">Submit</a>
              </div>
            </form>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <div>
          <b>ElectroMart</b>
          <div class="muted">Electronics online shoppiing</div>
        </div>
        <div class="footer-links">
          <a href="about.html">About</a>
          <a href="location.html">Location</a>
          <a href="products.html">Products</a>
        </div>

      </div>
    </footer>
  </div>
</body>
</html>
