<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ElectroMart | Checkout</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page">
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="index.html">ElectroMart</a>
        <nav class="nav" aria-label="Primary">
          <a href="index.html">Home</a>
          <a href="products.html">Products</a>
          <a href="about.html">About</a>
          <a href="location.html">Location</a>
          <a href="contact.html">Contact</a>
          <a href="cart.html">Cart</a>
        </nav>

        <div class="header-actions"><div class="search">Checkout</div></div>
      </div>
    </header>

    <main class="container">
      <section class="section">
        <h2 class="section-title">Checkout</h2>
        <div class="detail-grid" style="margin-top:14px;">
          <div class="card">
            <h3 style="margin-top:0;">Shipping Details</h3>
            <form action="#">
              <div class="form-grid" style="margin-top:12px;">
                <div>
                  <label class="small">Full Name</label>
                  <input type="text" placeholder="Your name" />
                </div>
                <div>
                  <label class="small">Phone</label>
                  <input type="tel" placeholder="9876543210" />
                </div>
              </div>

              <div style="margin-top:12px;">
                <label class="small">Address</label>
                <input type="text" placeholder="House / Street / Area" />
              </div>

              <div class="form-grid" style="margin-top:12px;">
                <div>
                  <label class="small">City</label>
                  <input type="text" placeholder="City" />
                </div>
                <div>
                  <label class="small">PIN Code</label>
                  <input type="text" placeholder="000000" />
                </div>
              </div>

              <div style="margin-top:14px;">
                <a class="btn primary" href="index.html" style="width:100%;">Place Order</a>
              </div>
            </form>
          </div>

          <div class="card">
            <h3 style="margin-top:0;">Order Summary</h3>
            <div class="kv" style="margin-top:12px;">
              <div><span>Items</span><b>2</b></div>
              <div><span>Subtotal</span><b>₹ 27,597</b></div>
              <div><span>Discount</span><b>- ₹ 500</b></div>
              <div><span>Delivery</span><b>₹ 0</b></div>
              <div><span>Total</span><b>₹ 27,097</b></div>
            </div>
            <div style="margin-top:14px;">
              <a class="btn" href="cart.html" style="width:100%;">Back to Cart</a>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <div>
          <b>ElectroMart</b>
          <div class="muted">Electronics online shoppiing</div>
        </div>
        <div class="footer-links">
          <a href="products.html">Products</a>
          <a href="location.html">Location</a>
          <a href="contact.html">Contact</a>

        </div>
      </div>
    </footer>
  </div>
</body>
</html>
